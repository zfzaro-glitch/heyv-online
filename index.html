<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heyv Online | هەیڤ ئۆنلاین</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19;
            /* ڕێکخستنی باگراوندەکە بۆ شاشەی مۆبایل */
            background-image: url('photo.jpg'); 
            background-size: cover; 
            background-position: center center;
            background-repeat: no-repeat;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            /* 100dvh یارمەتیدەرە بۆ ئەوەی بەهۆی براوزەری مۆبایلەوە شاشەکە نەبڕدرێت */
            min-height: 100vh;
            min-height: 100dvh; 
            margin: 0;
            padding: 20px 0;
            box-sizing: border-box;
        }

        .card {
            width: 90%;
            max-width: 420px;
            background: rgba(11, 15, 25, 0.75); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            margin: auto; /* یارمەتیدەرە بۆ سەنتەرکردن لەسەر مۆبایل */
        }

        .logo-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 4px;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 26px;
            margin: 0 0 20px 0;
            letter-spacing: 2px;
            font-weight: 600;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .welcome-text {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .kurdish-text {
            font-size: 15px;
            line-height: 1.6;
            margin: 0 0 10px 0;
            color: #ffffff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        .arabic-text {
            font-size: 14px;
            line-height: 1.6;
            margin: 0;
            color: var(--text-muted);
        }

        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            border-radius: 16px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
            border: none;
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            filter: brightness(1.1);
        }

        .instagram { 
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); 
        }
        
        .tiktok { 
            background-color: #000000; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
        }

        .btn i { font-size: 22px; width: 40px; text-align: center; }
        .btn span { flex-grow: 1; text-align: center; padding-right: 20px; letter-spacing: 1px;}

        .footer {
            margin-top: 35px;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="logo.jpg" alt="Heyv Online Logo" class="logo-img">

        <h1>HEYV ONLINE</h1>

        <div class="welcome-text">
            <p class="kurdish-text">
                بخێربێن بو پەیجێ هەیڤ ئونلاین<br>
                بەرهەمێن مە ئوریجینالن و بگرەنتینە
            </p>
            <p class="arabic-text">
                أهلاً بكم في صفحة هيڤ أونلاين<br>
                منتجاتنا أصلية ومضمونة
            </p>
        </div>

        <div class="btn-list">
            
            <a href="https://www.instagram.com/heyv.online?igsh=MXUybDRsYmo0dng4dQ%3D%3D&utm_source=qr" class="btn instagram" target="_blank" rel="noopener">
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
            </a>

            <a href="https://www.tiktok.com/@heyv.online?_r=1&_t=ZS-94xpCm5zpgm" class="btn tiktok" target="_blank" rel="noopener">
                <i class="fab fa-tiktok"></i>
                <span>TikTok</span>
            </a>
            
        </div>

        <div class="footer">
            POWERED BY SUNFLOWER WEB
        </div>
    </div>

</body>
</html>
